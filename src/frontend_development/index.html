                        role: 'assistant',

                    }]);

                        {/* Chat Messages */}
                        <div className="flex-1 overflow-y-auto p-6 space-y-6 chat-scroll">
                            {messages.map((msg, idx) => (
                                <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] rounded-2xl p-4 ${
                                        msg.role === 'user' 
                                            ? 'bg-blue-600 text-white rounded-tr-sm' 
                                            : 'bg-slate-800 border border-slate-700 rounded-tl-sm text-slate-200'
                                    }`}>
                                        {msg.type === 'sql' && (
                                            <div className="mb-2 inline-flex items-center gap-1.5 text-xs font-bold text-blue-400 bg-blue-900/30 px-2 py-1 rounded border border-blue-800">
                                                <i data-lucide="database" className="w-3 h-3"></i> Routed to SQL Agent
                                            </div>
                                        )}
                                        {msg.type === 'rag' && (
                                            <div className="mb-2 inline-flex items-center gap-1.5 text-xs font-bold text-purple-400 bg-purple-900/30 px-2 py-1 rounded border border-purple-800">
                                                <i data-lucide="file-text" className="w-3 h-3"></i> Routed to Semantic Agent
                                            </div>
                                        )}
                                        <p className="leading-relaxed">{msg.content}</p>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Chat Input */}
                        <div className="p-4 bg-slate-800/50 border-t border-slate-700/50">
                            <form onSubmit={handleSend} className="relative flex items-center">
                                <input 
                                    type="text" 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder="Ask a question about the data or policy (e.g. 'Show me 2024 placements' or 'What is the SEP funding rule?')..."
                                    className="w-full bg-slate-900 border border-slate-700 text-white rounded-xl pl-4 pr-12 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                                />
                                <button type="submit" className="absolute right-2 p-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activePage, setActivePage] = useState('blog'); // 'blog' or 'rag'

            useEffect(() => {
                // Re-initialize icons when page changes
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activePage]);

            return (
                <div className="min-h-screen">
                    <Navbar activePage={activePage} setActivePage={setActivePage} />
                    <main>
                        {activePage === 'blog' ? <BlogPage /> : <RAGInterface />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        // Initialize Lucide icons after React mounts
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
